<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egelloC Incubator</title>
  <script src="/config/brand.js"></script>
  <script>
    // Apply brand early so there's no flash of default text.
    (function() {
      var b = window.AIHUB_BRAND || {};
      if (b.name) document.title = "egelloC " + b.name;
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon/192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon/512.png">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222635;
      --border: #2a2e3b;
      --text: #e4e6eb;
      --text-muted: #8b8fa3;
      --text-dim: #5a5e70;
      --accent: #4f8ff7;
      --accent-dim: rgba(79, 143, 247, 0.12);
      --green: #22c55e;
      --purple: #a78bfa;
      --orange: #f59e0b;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* .topbar / user-info / logout-btn styles removed — the launcher
       is the Incubator home, so the hero logo + waffle drawer cover
       branding and user controls. No top chrome needed here. */

    .content {
      flex: 1; display: flex; flex-direction: row;
      align-items: flex-start; justify-content: center;
      gap: 32px;
      padding: 40px 24px;
    }
    .content-main {
      display: flex; flex-direction: column; align-items: center;
      flex: 1 1 auto; max-width: 960px; min-width: 0;
    }

    .welcome {
      text-align: center; margin-bottom: 48px;
    }
    .welcome .hero-logo {
      display: block; margin: 0 auto 20px;
      max-width: 360px; width: 100%; height: auto;
    }
    .welcome .tagline {
      font-style: italic; font-weight: 600;
      font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .welcome h2 {
      font-size: 28px; font-weight: 700; margin-bottom: 8px;
    }
    .welcome p {
      font-size: 15px; color: var(--text-muted);
    }

    .app-search {
      margin: 16px auto 0;
      display: block;
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .app-search:focus { border-color: var(--accent); }
    .app-search::placeholder { color: var(--text-dim); }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 960px;
      width: 100%;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .app-card:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }
    .app-card .drag-grip {
      position: absolute; top: 0; left: 0; bottom: 0; width: 20px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s; cursor: grab;
      color: var(--text-dim); border-radius: var(--radius) 0 0 var(--radius);
    }
    .app-card .drag-grip svg { width: 10px; height: 16px; }
    .app-card:hover .drag-grip { opacity: 1; }
    .app-card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }
    .app-card.dragging .drag-grip { cursor: grabbing; }
    .app-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
      transform: scale(1.02);
    }
    .app-card .icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .app-card .app-name {
      font-size: 17px; font-weight: 700;
    }
    .app-card .app-desc {
      font-size: 13px; color: var(--text-muted); line-height: 1.5;
    }
    .app-card .app-arrow {
      position: absolute;
      top: 28px; right: 24px;
      color: var(--text-dim);
      font-size: 18px;
      transition: all 0.2s;
    }
    .app-card:hover .app-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .app-card.locked {
      opacity: 0.4;
      pointer-events: none;
    }
    .app-card.locked .lock-badge {
      display: block;
    }
    .lock-badge {
      display: none;
      position: absolute; top: 12px; right: 12px;
      font-size: 10px; padding: 3px 8px; border-radius: 6px;
      background: rgba(239, 68, 68, 0.15); color: #ef4444;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* ── List view ── */
    .app-grid.list-view {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .app-grid.list-view .app-card {
      flex-direction: row;
      align-items: center;
      padding: 14px 20px;
      gap: 14px;
    }
    .app-grid.list-view .app-card .icon {
      width: 36px; height: 36px; font-size: 18px;
      flex-shrink: 0;
    }
    .app-grid.list-view .app-card .app-name {
      font-size: 14px; min-width: 180px;
    }
    .app-grid.list-view .app-card .app-desc {
      font-size: 12px; flex: 1;
    }
    .app-grid.list-view .app-card .app-arrow {
      position: static; margin-left: auto; flex-shrink: 0;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: inline-flex; gap: 2px;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 2px;
    }
    .view-toggle button {
      background: none; border: none; color: var(--text-dim);
      width: 28px; height: 24px; border-radius: 4px; cursor: pointer;
      font-size: 11px; line-height: 1; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .view-toggle button.active {
      background: var(--accent-dim); color: var(--accent);
    }
    .view-toggle button:hover:not(.active) {
      color: var(--text-muted);
    }

    /* Brand-app tiles: stronger fill + colored ring so platform icons
       (Briefer, Hub, Admin) are obviously distinct from deployed apps. */
    .icon-briefer { background: rgba(79, 143, 247, 0.32); color: var(--accent); box-shadow: inset 0 0 0 1px rgba(79, 143, 247, 0.55); }
    .icon-hub     { background: rgba(167, 139, 250, 0.32); color: var(--purple); box-shadow: inset 0 0 0 1px rgba(167, 139, 250, 0.55); }
    .icon-admin   { background: rgba(245, 158, 11, 0.32); color: var(--orange); box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.55); }
    /* Per-app icon palette — 10 hues spaced across the wheel for clear
       differentiation. Tile bg uses 0.32 alpha + a 1px colored inner ring
       so the chosen hue reads cleanly against #0f1117 even at a glance.
       (0.22 was still too muted on dark slate — most tiles read as the
       same gray-purple from across the room.) Teal+cyan dropped — too
       close to "greenish blue" for the hash collisions we used to
       produce. Avoids the brand colors used by icon-hub/briefer/admin so
       deployed apps stay visually separate from platform apps.
       assignIconColors() guarantees no two apps share a slot until the
       palette is exhausted. */
    .icon-clr-0 { background: rgba(239,  68,  68, 0.32); color: #ef4444; box-shadow: inset 0 0 0 1px rgba(239,  68,  68, 0.55); }  /* red */
    .icon-clr-1 { background: rgba(249, 115,  22, 0.32); color: #f97316; box-shadow: inset 0 0 0 1px rgba(249, 115,  22, 0.55); }  /* orange */
    .icon-clr-2 { background: rgba(250, 204,  21, 0.32); color: #facc15; box-shadow: inset 0 0 0 1px rgba(250, 204,  21, 0.55); }  /* yellow */
    .icon-clr-3 { background: rgba(132, 204,  22, 0.32); color: #84cc16; box-shadow: inset 0 0 0 1px rgba(132, 204,  22, 0.55); }  /* lime */
    .icon-clr-4 { background: rgba( 16, 185, 129, 0.32); color: #10b981; box-shadow: inset 0 0 0 1px rgba( 16, 185, 129, 0.55); }  /* emerald */
    .icon-clr-5 { background: rgba( 14, 165, 233, 0.32); color: #0ea5e9; box-shadow: inset 0 0 0 1px rgba( 14, 165, 233, 0.55); }  /* sky */
    .icon-clr-6 { background: rgba( 99, 102, 241, 0.32); color: #6366f1; box-shadow: inset 0 0 0 1px rgba( 99, 102, 241, 0.55); }  /* indigo */
    .icon-clr-7 { background: rgba(192, 132, 252, 0.32); color: #c084fc; box-shadow: inset 0 0 0 1px rgba(192, 132, 252, 0.55); }  /* violet */
    .icon-clr-8 { background: rgba(217,  70, 239, 0.32); color: #d946ef; box-shadow: inset 0 0 0 1px rgba(217,  70, 239, 0.55); }  /* fuchsia */
    .icon-clr-9 { background: rgba(236,  72, 153, 0.32); color: #ec4899; box-shadow: inset 0 0 0 1px rgba(236,  72, 153, 0.55); }  /* pink */

    /* Updates sidebar */
    .updates {
      width: 300px; flex-shrink: 0; align-self: stretch;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
    }
    .updates-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .updates-head h3 { font-size: 15px; font-weight: 700; }
    .updates-composer { margin-bottom: 16px; }
    .updates-composer textarea {
      width: 100%; min-height: 70px; resize: vertical;
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px; font-size: 13px; font-family: inherit; outline: none;
    }
    .updates-composer textarea:focus { border-color: var(--accent); }
    .updates-composer button {
      margin-top: 8px; width: 100%; padding: 8px; background: var(--accent);
      color: #fff; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .updates-composer button:hover { opacity: 0.9; }
    .updates-composer button:disabled { opacity: 0.5; cursor: default; }
    .updates-list { display: flex; flex-direction: column; gap: 10px; }
    .update-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; position: relative;
    }
    .update-card .update-body { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .update-card .update-meta { margin-top: 8px; font-size: 11px; color: var(--text-dim); }
    .update-card .update-del {
      position: absolute; top: 8px; right: 8px; background: none; border: none;
      color: var(--text-dim); cursor: pointer; font-size: 14px; line-height: 1;
      padding: 2px 6px; border-radius: 6px;
    }
    .update-card .update-del:hover { color: #ef4444; background: rgba(239, 68, 68, 0.12); }
    .updates-empty { font-size: 13px; color: var(--text-muted); }

    @media (max-width: 860px) {
      .content { flex-direction: column; align-items: center; }
      .updates { width: 100%; max-width: 360px; }
    }

    .footer {
      text-align: center; padding: 20px;
      font-size: 12px; color: var(--text-dim);
    }
  </style>
</head>
<body>

<div class="content">
  <div class="content-main">
  <div class="welcome">
    <img src="/assets/incubator-logo.png" alt="egelloC Incubator" class="hero-logo" id="heroLogo">
    <p class="tagline" id="heroTagline">Where tools hatch.</p>
    <h2 id="greeting">Welcome</h2>
    <div class="view-toggle" id="viewToggle" style="margin-top:12px;">
      <button onclick="setView('grid')" title="Grid view"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1.5"/><rect x="9" y="0" width="7" height="7" rx="1.5"/><rect x="0" y="9" width="7" height="7" rx="1.5"/><rect x="9" y="9" width="7" height="7" rx="1.5"/></svg></button>
      <button onclick="setView('list')" title="List view"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="1" width="16" height="3" rx="1"/><rect x="0" y="6.5" width="16" height="3" rx="1"/><rect x="0" y="12" width="16" height="3" rx="1"/></svg></button>
    </div>
    <input type="text" id="appSearch" class="app-search" placeholder="Search applications&hellip;"
           autocomplete="off" aria-label="Search applications">
  </div>

  <div class="app-grid" id="appGrid">
    <!-- Apps loaded dynamically -->
  </div>
  <p id="appSearchEmpty" style="display:none;color:var(--text-muted);text-align:center;margin-top:8px;">
    No applications match your search.
  </p>
  </div><!-- /.content-main -->

  <aside class="updates" id="updatesPanel">
    <div class="updates-head"><h3>Updates</h3></div>
    <div class="updates-composer" id="updatesComposer" style="display:none;">
      <textarea id="updateBody" placeholder="Share an update with the team&hellip;" maxlength="2000"></textarea>
      <button id="updatePost" onclick="postAnnouncement()">Post update</button>
    </div>
    <div class="updates-list" id="updatesList"></div>
  </aside>
</div>

<div class="footer" id="brandFooter">egelloC Incubator</div>

<script>
const APP_DEFS = [
  {
    slug: "hub",
    name: "Tech Knowledge Base",
    description: "Documentation, architecture, team resources, and internal tools",
    icon: "\ud83d\udcda",
    iconClass: "icon-hub",
    url: "/knowledge/",
    alwaysAccessible: false,
  },
  {
    slug: "briefer",
    name: "Coaching Briefer",
    description: "AI-powered pre-call briefings with student context, notes, and Fathom transcripts",
    icon: "\ud83d\udccb",
    iconClass: "icon-briefer",
    url: "/briefer/",
    alwaysAccessible: false,
  },
  {
    slug: "admin",
    name: "Admin Panel",
    description: "Manage user permissions and application access for the team",
    icon: "\u2699\ufe0f",
    iconClass: "icon-admin",
    url: "/admin",
    alwaysAccessible: false,
  },
];

var ICON_PALETTE_SIZE = 10;
function slugColor(slug) {
  var h = 0;
  for (var i = 0; i < slug.length; i++) h = ((h << 5) - h + slug.charCodeAt(i)) | 0;
  return ((h % ICON_PALETTE_SIZE) + ICON_PALETTE_SIZE) % ICON_PALETTE_SIZE;
}

// Assign each app a palette slot, keeping the slug→color mapping stable
// across renders when possible (so muscle memory works) BUT guaranteeing
// uniqueness up to ICON_PALETTE_SIZE — when two slugs hash to the same
// slot, the later one walks forward to the next free slot instead of
// duplicating the color. Without this, ~9 deployed apps over 8 buckets
// guaranteed at least one collision (the "greenish-blue keeps popping up"
// complaint). Skips apps that already have a brand-specific iconClass
// (icon-hub/briefer/admin) so platform apps keep their fixed colors.
function assignIconColors(apps) {
  var taken = new Set();
  // Pass 1 — claim preferred slot when free.
  apps.forEach(function(a) {
    if (a.iconClass) return;
    var pref = slugColor(a.slug);
    if (!taken.has(pref)) {
      taken.add(pref);
      a.iconClass = "icon-clr-" + pref;
    }
  });
  // Pass 2 — collisions: walk forward until a slot is free, or wrap if
  // we have more apps than palette colors (unavoidable duplicates).
  apps.forEach(function(a) {
    if (a.iconClass) return;
    var pref = slugColor(a.slug);
    for (var step = 1; step <= ICON_PALETTE_SIZE; step++) {
      var slot = (pref + step) % ICON_PALETTE_SIZE;
      if (!taken.has(slot)) {
        taken.add(slot);
        a.iconClass = "icon-clr-" + slot;
        return;
      }
    }
    a.iconClass = "icon-clr-" + pref;
  });
}

async function loadDeployedApps() {
  try {
    const resp = await fetch("/launcher/api/apps");
    if (!resp.ok) return [];
    const data = await resp.json();
    return (data.apps || []).map(function(app) {
      return {
        slug: app.slug,
        name: app.name,
        description: app.description || "",
        icon: app.icon || "&#x1f4e6;",
        url: "/" + app.slug + "/",
        alwaysAccessible: false,
      };
    });
  } catch (e) {
    return [];
  }
}

async function init() {
  // Load deployed apps in parallel with auth check
  const deployedPromise = loadDeployedApps();
  try {
    const resp = await fetch("/auth/me");
    if (resp.ok) {
      const user = await resp.json();
      if (user.authenticated) {
        const firstName = (user.name || "").split(" ")[0] || "there";
        document.getElementById("greeting").textContent = "Welcome, " + firstName;
        const deployed = await deployedPromise;
        renderApps(user.permissions || [], deployed);
        loadAnnouncements((user.permissions || []).indexOf("admin") !== -1);
        return;
      }
    }
  } catch (e) {}
  renderApps([], []);
}

function renderApps(userPerms, deployedApps) {
  const grid = document.getElementById("appGrid");
  const knownSlugs = new Set(APP_DEFS.map(a => a.slug));
  const allApps = APP_DEFS.concat((deployedApps || []).filter(a => !knownSlugs.has(a.slug)));
  const accessible = allApps.filter(app => app.alwaysAccessible || userPerms.includes(app.slug));

  if (accessible.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;grid-column:1/-1;">No applications available. Contact an admin for access.</p>';
    return;
  }

  // Color-assign after merging so collisions are resolved across the
  // full rendered set, not bucket-by-slug-hash where duplicates leaked.
  assignIconColors(accessible);

  // Apply saved order
  var savedOrder = [];
  try { savedOrder = JSON.parse(localStorage.getItem("launcher-order") || "[]"); } catch(e) {}
  if (savedOrder.length > 0) {
    accessible.sort(function(a, b) {
      var ai = savedOrder.indexOf(a.slug), bi = savedOrder.indexOf(b.slug);
      if (ai === -1) ai = 999;
      if (bi === -1) bi = 999;
      return ai - bi;
    });
  }

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  var gripSvg = '<div class="drag-grip"><svg viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="2" r="1.2"/><circle cx="7" cy="2" r="1.2"/><circle cx="3" cy="6" r="1.2"/><circle cx="7" cy="6" r="1.2"/><circle cx="3" cy="10" r="1.2"/><circle cx="7" cy="10" r="1.2"/><circle cx="3" cy="14" r="1.2"/><circle cx="7" cy="14" r="1.2"/></svg></div>';
  grid.innerHTML = accessible.map(app => {
    return '<a class="app-card" draggable="true" data-slug="' + esc(app.slug) + '" href="' + esc(app.url) + '">' +
      gripSvg +
      '<div class="icon ' + esc(app.iconClass || '') + '">' + app.icon + '</div>' +
      '<div class="app-name">' + esc(app.name) + '</div>' +
      '<div class="app-desc">' + esc(app.description) + '</div>' +
      '<div class="app-arrow">&rarr;</div>' +
    '</a>';
  }).join("");

  initDragAndDrop();
  filterApps();
}

// Show only the app cards whose name or description matches the search box.
// Toggles display rather than re-rendering, so drag order and handlers survive.
function filterApps() {
  var input = document.getElementById("appSearch");
  if (!input) return;
  var q = input.value.trim().toLowerCase();
  var cards = document.querySelectorAll("#appGrid .app-card");
  var visible = 0;
  cards.forEach(function(card) {
    var name = (card.querySelector(".app-name") || {}).textContent || "";
    var desc = (card.querySelector(".app-desc") || {}).textContent || "";
    var match = !q || (name + " " + desc).toLowerCase().indexOf(q) !== -1;
    card.style.display = match ? "" : "none";
    if (match) visible++;
  });
  var empty = document.getElementById("appSearchEmpty");
  // Only show "no matches" when a query is active and the grid itself is non-empty.
  if (empty) empty.style.display = (q && visible === 0 && cards.length > 0) ? "block" : "none";
}

// Updates sidebar
var _isAdmin = false;

function _annEsc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function fmtDate(s) {
  if (!s) return "";
  // SQLite datetime('now') is UTC "YYYY-MM-DD HH:MM:SS".
  var d = new Date(s.replace(" ", "T") + "Z");
  if (isNaN(d.getTime())) return s;
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  if (diff < 604800) return Math.floor(diff/86400) + "d ago";
  return d.toLocaleDateString();
}

async function loadAnnouncements(isAdmin) {
  if (typeof isAdmin === "boolean") _isAdmin = isAdmin;
  var composer = document.getElementById("updatesComposer");
  if (composer) composer.style.display = _isAdmin ? "block" : "none";
  var list = document.getElementById("updatesList");
  try {
    var resp = await fetch("/launcher/api/announcements");
    if (!resp.ok) throw new Error("http " + resp.status);
    var data = await resp.json();
    renderAnnouncements(data.announcements || []);
  } catch (e) {
    if (list) list.innerHTML = '<p class="updates-empty">Couldn\'t load updates.</p>';
  }
}

function renderAnnouncements(items) {
  var list = document.getElementById("updatesList");
  if (!list) return;
  if (!items.length) {
    list.innerHTML = '<p class="updates-empty">No updates yet.</p>';
    return;
  }
  list.innerHTML = items.map(function(a) {
    var who = a.created_by_name || a.created_by || "";
    var when = fmtDate(a.created_at);
    var sep = (who && when) ? " &middot; " : "";
    var del = _isAdmin
      ? '<button class="update-del" title="Delete" onclick="deleteAnnouncement(' + Number(a.id) + ')">&times;</button>'
      : '';
    return '<div class="update-card">' + del +
      '<div class="update-body">' + _annEsc(a.body) + '</div>' +
      '<div class="update-meta">' + _annEsc(who) + sep + _annEsc(when) + '</div>' +
    '</div>';
  }).join("");
}

async function postAnnouncement() {
  var ta = document.getElementById("updateBody");
  var btn = document.getElementById("updatePost");
  if (!ta) return;
  var body = ta.value.trim();
  if (!body) return;
  if (btn) btn.disabled = true;
  try {
    var resp = await fetch("/launcher/api/announcements", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ body: body })
    });
    if (resp.ok) { ta.value = ""; await loadAnnouncements(); }
  } catch (e) {}
  if (btn) btn.disabled = false;
}

async function deleteAnnouncement(id) {
  try {
    var resp = await fetch("/launcher/api/announcements/" + Number(id) + "/delete", { method: "POST" });
    if (resp.ok) await loadAnnouncements();
  } catch (e) {}
}

function initDragAndDrop() {
  const grid = document.getElementById("appGrid");
  let dragEl = null;

  grid.addEventListener("dragstart", function(e) {
    var card = e.target.closest(".app-card");
    if (!card) return;
    dragEl = card;
    card.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", card.dataset.slug);
  });

  grid.addEventListener("dragend", function(e) {
    var card = e.target.closest(".app-card");
    if (card) card.classList.remove("dragging");
    grid.querySelectorAll(".drag-over").forEach(function(el) { el.classList.remove("drag-over"); });
    dragEl = null;
  });

  grid.addEventListener("dragover", function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    var card = e.target.closest(".app-card");
    if (!card || card === dragEl) return;
    grid.querySelectorAll(".drag-over").forEach(function(el) { el.classList.remove("drag-over"); });
    card.classList.add("drag-over");
  });

  grid.addEventListener("dragleave", function(e) {
    var card = e.target.closest(".app-card");
    if (card) card.classList.remove("drag-over");
  });

  grid.addEventListener("drop", function(e) {
    e.preventDefault();
    var target = e.target.closest(".app-card");
    if (!target || !dragEl || target === dragEl) return;
    target.classList.remove("drag-over");
    // Swap positions in DOM
    var cards = Array.from(grid.querySelectorAll(".app-card"));
    var dragIdx = cards.indexOf(dragEl);
    var dropIdx = cards.indexOf(target);
    if (dragIdx < dropIdx) {
      grid.insertBefore(dragEl, target.nextSibling);
    } else {
      grid.insertBefore(dragEl, target);
    }
    // Save new order
    var newOrder = Array.from(grid.querySelectorAll(".app-card")).map(function(el) { return el.dataset.slug; });
    try { localStorage.setItem("launcher-order", JSON.stringify(newOrder)); } catch(e) {}
  });

  // Prevent navigating on drag
  grid.addEventListener("click", function(e) {
    if (e.target.closest(".app-card.dragging")) e.preventDefault();
  });
}

function setView(mode) {
  const grid = document.getElementById("appGrid");
  const btns = document.querySelectorAll("#viewToggle button");
  if (mode === "list") {
    grid.classList.add("list-view");
    btns[0].classList.remove("active");
    btns[1].classList.add("active");
  } else {
    grid.classList.remove("list-view");
    btns[0].classList.add("active");
    btns[1].classList.remove("active");
  }
  try { localStorage.setItem("launcher-view", mode); } catch(e) {}
}

// Restore saved preference
(function() {
  var saved = "grid";
  try { saved = localStorage.getItem("launcher-view") || "grid"; } catch(e) {}
  if (saved === "list") {
    document.getElementById("appGrid").classList.add("list-view");
  }
  var btns = document.querySelectorAll("#viewToggle button");
  if (btns.length >= 2) {
    btns[saved === "list" ? 1 : 0].classList.add("active");
  }
})();

init();

// Live-filter the app grid as the user types.
(function() {
  var search = document.getElementById("appSearch");
  if (search) search.addEventListener("input", filterApps);
})();

// Apply brand to hero logo, tagline, and footer.
(function() {
  var b = window.AIHUB_BRAND || {};
  var logo = document.getElementById("heroLogo");
  if (logo && b.logo_url) { logo.src = b.logo_url; logo.alt = "egelloC " + (b.name || ""); }
  var tag = document.getElementById("heroTagline");
  if (tag && b.tagline) tag.textContent = b.tagline;
  var foot = document.getElementById("brandFooter");
  if (foot && b.name) foot.textContent = "egelloC " + b.name;
})();
</script>
