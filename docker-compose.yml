services:
  # ── Admin Panel (Flask — port 5051) ──
  admin-panel:
    build: .
    container_name: aihub-admin-panel
    restart: unless-stopped
    ports:
      - "5051:5051"
    env_file: .env
    environment:
      - DEPLOY_SERVICE_URL=http://deploy-service:5001
    volumes:
      # Mount local files so changes are reflected without rebuilding
      - ./server.py:/app/server.py:ro
      - ./permissions.py:/app/permissions.py:ro
      - ./admin.html:/app/admin.html:ro
      - ./launcher.html:/app/launcher.html:ro
      - ./hub-navbar.js:/app/hub-navbar.js:ro
      # Persist permissions DB across restarts
      - ./permissions.db:/app/permissions.db
      # Persist read-only DB users across restarts
      - ./readonly_db_users.json:/app/readonly_db_users.json
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',5051),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aihub

  # ── Deploy Service (Flask — port 5001) ──
  # Handles app deploys: build images, start containers, nginx config, DB provisioning
  deploy-service:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    container_name: aihub-deploy-service
    restart: unless-stopped
    # No host port — only reachable within the Docker network (via admin-panel proxy)
    expose:
      - "5001"
    volumes:
      # Docker socket — so it can build/run containers
      - /var/run/docker.sock:/var/run/docker.sock
      # App source code (persisted across deploys)
      - ./apps:/app/apps
      # Nginx app configs (written by deploy, read by Nginx)
      - ./nginx/apps:/app/nginx/apps
      # Starter template (for local deploys)
      - ./starter-template:/app/starter-template:ro
      # Platform .env — passed to deployed app containers
      - ./.env:/app/platform.env:ro
    environment:
      - DOCKER_NETWORK=aihub
      - NGINX_APPS_DIR=/app/nginx/apps
      - NGINX_CONTAINER=aihub-nginx
      - APPS_DIR=/app/apps
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aihub
      - POSTGRES_USER=${POSTGRES_USER:-aihub_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aihub_local_dev}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PLATFORM_ENV_FILE=/app/platform.env
      - AIHUB_AUTH_URL=http://admin-panel:5051/auth/me
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aihub

  # ── Nginx Reverse Proxy (port 80) ──
  nginx:
    image: nginx:alpine
    container_name: aihub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/apps:/etc/nginx/apps:ro
      - ./nginx/error-pages:/etc/nginx/error-pages:ro
    depends_on:
      - admin-panel
    networks:
      - aihub

  # ── Shared Postgres (for deployed apps) ──
  postgres:
    image: postgres:16-alpine
    container_name: aihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aihub
      POSTGRES_USER: ${POSTGRES_USER:-aihub_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aihub_local_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aihub_admin} -d aihub"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aihub

volumes:
  postgres_data:

networks:
  aihub:
    name: aihub
    driver: bridge
