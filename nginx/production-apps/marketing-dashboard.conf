location /marketing-dashboard/_stcore/stream {
    proxy_pass http://127.0.0.1:8501/_stcore/stream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
}

location /marketing-dashboard/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /marketing-dashboard;
    proxy_set_header Accept-Encoding "";
    sub_filter '</body>' '<script src="/hub-navbar.js" defer></script><script>document.addEventListener("DOMContentLoaded",function(){setTimeout(function(){var bar=document.querySelector(".hub-bar");if(bar){var clone=bar.cloneNode(true);bar.remove();clone.style.cssText="position:fixed;bottom:20px;right:20px;z-index:2147483647;pointer-events:auto;isolation:isolate;";document.body.appendChild(clone);clone.querySelector(".hub-waffle").onclick=function(){clone.querySelector(".hub-dropdown").classList.toggle("open");};}},3000);});</script></body>';
    sub_filter_once on;
    sub_filter_types text/html;
    proxy_set_header Connection '';
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
}
