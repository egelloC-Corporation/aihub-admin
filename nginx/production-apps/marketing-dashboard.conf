location /marketing-dashboard/_stcore/stream {
    proxy_pass http://127.0.0.1:8501/_stcore/stream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
}

location /marketing-dashboard/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /marketing-dashboard;
    proxy_set_header Accept-Encoding "";
    # The Streamlit stacking-context workaround (clone hub-bar + reattach
    # with `isolation:isolate` after React mounts) used to live here as
    # an inline script. It's now inside hub-navbar.js itself, gated on
    # its Streamlit detection, so one script applies consistently to
    # both Streamlit dashboards.
    sub_filter '</body>' '<script src="/hub-navbar.js" defer></script></body>';
    sub_filter_once on;
    sub_filter_types text/html;
    proxy_set_header Connection '';
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
}
