# Next.js 16 with basePath=/roadmap-generator.
# basePath generates /roadmap-generator/... in pre-built HTML, but `next start`
# in 16.1.x still routes at / — nginx strips the prefix before proxying.
#
# KNOWN NEXT 16 BUG (workaround below): when Next renders a dynamic route at
# runtime, it only applies basePath to URL emission if the INCOMING request
# path starts with basePath. Because we strip the prefix, the RSC streaming
# payload embeds /_next/... URLs WITHOUT the prefix. On edit pages the client
# parses those, injects duplicate <script> tags for chunks that were already
# loaded from pre-rendered shell HTML, and module double-registration breaks
# hydration. X-Forwardrefix does not help. sub_filter below rewrites
# unprefixed /_next/... refs before they reach the browser, anchored on the
# preceding quote char so we never double-prefix an already-correct URL.

# Index: /roadmap-generator -> strip to /
location = /roadmap-generator {
    proxy_pass http://127.0.0.1:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /roadmap-generator;
    proxy_set_header Connection '';
    proxy_set_header Accept-Encoding '';
    proxy_http_version 1.1;
    proxy_buffering on;
    proxy_read_timeout 300s;
    client_max_body_size 50m;

    sub_filter_once off;
    sub_filter_types text/html application/json application/x-component text/x-component;
    sub_filter "\"/_next/"     "\"/roadmap-generator/_next/";
    sub_filter "\\\"/_next/"   "\\\"/roadmap-generator/_next/";
}

# Everything else: /roadmap-generator/* -> strip prefix -> /*
location /roadmap-generator/ {
    proxy_pass http://127.0.0.1:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /roadmap-generator;
    proxy_set_header Connection '';
    proxy_set_header Accept-Encoding '';
    proxy_http_version 1.1;
    proxy_buffering on;
    proxy_read_timeout 300s;
    client_max_body_size 50m;

    sub_filter_once off;
    sub_filter_types text/html application/json application/x-component text/x-component;
    sub_filter "\"/_next/"     "\"/roadmap-generator/_next/";
    sub_filter "\\\"/_next/"   "\\\"/roadmap-generator/_next/";
}

# Safety-net for any unprefixed /_next/... URLs sub_filter misses.
location /_next/static/ {
    proxy_pass http://127.0.0.1:8011;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
}
