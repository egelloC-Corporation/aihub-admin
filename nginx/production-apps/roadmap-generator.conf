# Next.js 16 standalone with basePath=/roadmap-generator.
# basePath generates correct /roadmap-generator/... links and asset URLs in HTML,
# but the server still routes at / (standalone mode ignores basePath for routing).
# Nginx strips the prefix before proxying so the app sees root-relative paths.

# Index: /roadmap-generator → strip to /
location = /roadmap-generator {
    proxy_pass http://127.0.0.1:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    client_max_body_size 50m;
}

# Everything else: /roadmap-generator/* → strip prefix → /*
location /roadmap-generator/ {
    proxy_pass http://127.0.0.1:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    client_max_body_size 50m;
}
