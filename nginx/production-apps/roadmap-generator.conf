# Next.js with basePath=/roadmap-generator (standalone mode).
# nginx strips the prefix so Next sees / for the index page — works around
# a Next.js 16 standalone bug where basePath root returns empty/404.
# basePath still handles asset URL generation (/roadmap-generator/_next/...).

# Index: /roadmap-generator → strip prefix → forward as /
location = /roadmap-generator {
    proxy_pass http://127.0.0.1:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    client_max_body_size 50m;
}

# Sub-pages + assets: /roadmap-generator/anything → strip prefix → /anything
location /roadmap-generator/ {
    proxy_pass http://127.0.0.1:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    client_max_body_size 50m;
}
