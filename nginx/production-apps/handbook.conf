# Next.js app with basePath=/handbook.
# Uses 'location ^~ /handbook' (prefix match, no trailing slash) so nginx does not
# auto-append a trailing slash — Next.js 308-redirects /handbook/ back to /handbook,
# and an auto-append would create an infinite redirect loop.
# proxy_pass has no URI segment, so the full path is forwarded (preserves the
# basePath prefix that Next.js expects).

location ^~ /handbook {
    proxy_pass http://127.0.0.1:3456;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
}
