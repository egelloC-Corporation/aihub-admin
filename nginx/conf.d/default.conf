server {
    listen 80;
    server_name localhost aihub.egelloc.com;

    client_max_body_size 50m;

    # ── Custom error pages ──
    error_page 502 503 504 /error-502.html;
    location = /error-502.html {
        root /etc/nginx/error-pages;
        internal;
        try_files /502.html =502;
    }

    # ── Per-app routes (generated by deploy script) ──
    include /etc/nginx/apps/*.conf;

    # ── Default: admin panel handles everything else ──
    # This covers: /, /launcher, /login, /auth/*, /logout, /admin/*,
    # /briefer/*, /knowledge, /hub-navbar.js, static assets
    location / {
        proxy_pass http://admin-panel:5051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming (for /ask endpoint)
        proxy_set_header Connection '';
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}
