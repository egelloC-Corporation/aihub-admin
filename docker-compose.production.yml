services:
  admin-panel:
    build: .
    container_name: aihub-admin-panel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "5051:5051"
    env_file: .env
    environment:
      - DEPLOY_SERVICE_URL=http://deploy-service:5001
      # Admin panel must stay on the nest primary for the Access-tab
      # CREATE USER / DROP USER flow (replica refuses DDL with errno 1290).
      # platform.env's DB_HOST is the replica so other apps inherit safely.
      - DB_HOST=db-mysql-nyc1-52583-do-user-18492245-0.e.db.ondigitalocean.com
    volumes:
      - ./permissions.db:/app/permissions.db
      - ./readonly_db_users.json:/app/readonly_db_users.json
      - ./ip_labels.json:/app/ip_labels.json
      - ./ssh_aliases.json:/app/ssh_aliases.json
      # Per-app secrets (/var/www/aihub-admin/secrets/<slug>.env) — mounted at
      # the same path as on the host so SECRETS_DIR default works unchanged.
      # Same files the deploy flow injects via docker run --env-file.
      - /var/www/aihub-admin/secrets:/var/www/aihub-admin/secrets
      # Shared API key vault sourced by all agents/scripts. Managed through
      # the Secrets tab as the pseudo-slug "_shared".
      - /etc/egelloc/keys:/etc/egelloc/keys
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',5051),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aihub

  deploy-service:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    container_name: aihub-deploy-service
    restart: unless-stopped
    expose:
      - "5001"
    # Pull platform-wide secrets (ACQ_DB_*, INCUBATOR_LOG_DB_*, etc.) from
    # the same .env the admin-panel uses. Needed for the deploy_runs audit
    # writer (reads ACQ_DB_HOST etc.). The explicit `environment:` block
    # below still takes precedence for anything it sets (POSTGRES_HOST=
    # postgres, for example).
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps:/app/apps
      - ./nginx/apps:/app/nginx/apps
      - ./nginx/production-apps:/app/nginx/production-apps:ro
      - ./.env:/app/platform.env:ro
      # Mount the platform repo so /self-deploy can git pull + docker compose
      # rebuild admin-panel when the aihub-admin repo is pushed. Mounted at the
      # SAME PATH as the host so compose's relative bind mounts (e.g.
      # ./permissions.db) resolve to host paths the daemon can find. RW because
      # git operations write to .git/. Same trust level as docker.sock above.
      - /var/www/aihub-admin:/var/www/aihub-admin
      # Production nginx app config dir — deploy-service writes here, system nginx reads here.
      # docker.sock lets deploy-service reload nginx via `docker run --pid=host`.
      - /etc/nginx/aihub-apps:/etc/nginx/aihub-apps
    environment:
      - DOCKER_NETWORK=aihub
      - NGINX_APPS_DIR=/etc/nginx/aihub-apps
      - NGINX_CONTAINER=aihub-nginx
      - APPS_DIR=/app/apps
      - HOST_APPS_DIR=/var/www/aihub-admin/apps
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aihub
      - POSTGRES_USER=${POSTGRES_USER:-aihub_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aihub_local_dev}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PLATFORM_ENV_FILE=/app/platform.env
      - AIHUB_AUTH_URL=http://admin-panel:5051/auth/me
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aihub

  postgres:
    image: postgres:16-alpine
    container_name: aihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aihub
      POSTGRES_USER: ${POSTGRES_USER:-aihub_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aihub_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aihub_admin} -d aihub"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aihub

volumes:
  postgres_data:

networks:
  aihub:
    name: aihub
    driver: bridge
